name: Deploy to Oracle Cloud (Mumbai)

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel a running deploy mid-flight

jobs:
  # ── 1. Lint & safety check (runs on GitHub, not the server) ──────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dev dependencies
        run: pip install -r backend/requirements/dev.txt

      - name: Run Django system checks
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: gyangrit.settings.dev
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: ci-only-not-a-real-secret
        run: python manage.py check --fail-level WARNING

  # ── 2. Deploy to Oracle Cloud (only after lint passes) ───────────────────────
  deploy:
    name: Deploy to Oracle Cloud Mumbai
    runs-on: ubuntu-latest
    needs: lint     # lint must pass first
    environment: production

    steps:
      - name: Notify deploy start
        run: echo "🚀 Deploying to Oracle Cloud Mumbai (161.118.168.247)"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail    # exit immediately on any error

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 Step 1/5: Pull latest from master"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cd /opt/gyangrit
            git fetch origin master
            git reset --hard origin/master

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🐍 Step 2/5: Install/update Python deps"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            source backend/venv/bin/activate
            pip install --quiet --upgrade pip
            pip install --quiet -r backend/requirements/prod.txt

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🗄️  Step 3/5: Run DB migrations"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cd backend
            python manage.py migrate --no-input
            python manage.py collectstatic --no-input --clear

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Step 4/5: Restart Gunicorn gracefully"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cd /opt/gyangrit
            # Graceful reload: existing workers finish requests, new workers start
            sudo systemctl reload gyangrit || sudo systemctl restart gyangrit

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🏥 Step 5/5: Health check"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sleep 4
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              https://api.gyangrit.site/api/v1/auth/csrf/ || echo "000")

            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "204" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS)"
            else
              echo "❌ Health check FAILED (HTTP $HTTP_STATUS)"
              echo "Rolling back systemd service..."
              sudo systemctl restart gyangrit
              exit 1
            fi

            echo ""
            echo "✅ Deploy complete! Backend is live at https://api.gyangrit.site"

      - name: Deploy succeeded
        if: success()
        run: echo "✅ Production deployment successful"

      - name: Deploy failed
        if: failure()
        run: |
          echo "❌ Deployment FAILED. Check logs above."
          echo "SSH into 161.118.168.247 and run: sudo journalctl -u gyangrit -n 50"
          exit 1