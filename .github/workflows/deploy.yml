name: Deploy to Oracle Cloud (Mumbai)

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── 1. Lint & Django system check ────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements/prod.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/prod.txt

      - name: Run Django system checks
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: gyangrit.settings.test
          SECRET_KEY: ci-only-not-a-real-secret
        run: python manage.py check --fail-level WARNING

  # ── 2. Backend Tests (96 tests, SQLite in-memory ~11s) ───────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements/prod.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements/prod.txt
          pip install pytest pytest-django

      - name: Run test suite
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: gyangrit.settings.test
          SECRET_KEY: ci-only-not-a-real-secret
        run: python -m pytest --tb=short -q

  # ── 3. Deploy to Oracle Cloud ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud Mumbai
    runs-on: ubuntu-latest
    needs: [lint, test]
    environment: production

    steps:
      - name: Notify deploy start
        run: echo "Deploying to Oracle Cloud Mumbai"

      - name: SSH deploy with rollback on failure
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP=/opt/gyangrit
            BACKEND=$APP/backend

            cd $APP

            # ── Save current SHA for rollback ─────────────────────────────────
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Pre-deploy SHA: $PREV_SHA"

            # ── Rollback function ─────────────────────────────────────────────
            rollback() {
              echo ""
              echo "DEPLOY FAILED — rolling back to $PREV_SHA"
              cd $APP
              if [ "$PREV_SHA" != "none" ]; then
                git checkout "$PREV_SHA" -- . 2>/dev/null || git reset --hard HEAD
              fi
              source $BACKEND/venv/bin/activate
              cd $BACKEND
              python manage.py collectstatic --no-input --clear 2>/dev/null || true
              cd $APP
              sudo systemctl restart gyangrit
              sleep 3
              echo "Rollback complete."
              exit 1
            }
            trap rollback ERR

            echo "======================================================"
            echo "Step 1/5 — Pull latest master"
            echo "======================================================"
            cd $APP
            git checkout -- . 2>/dev/null || true
            git fetch origin master --prune --force
            NEW_SHA=$(git rev-parse origin/master)
            echo "Deploying: $PREV_SHA -> $NEW_SHA"
            git reset --hard origin/master

            echo "======================================================"
            echo "Step 2/5 — Install Python dependencies"
            echo "======================================================"
            source $BACKEND/venv/bin/activate
            pip install --quiet --upgrade pip
            pip install --quiet -r $BACKEND/requirements/prod.txt

            echo "======================================================"
            echo "Step 3/5 — DB migrations + static files"
            echo "======================================================"
            cd $BACKEND
            python manage.py migrate --no-input
            python manage.py collectstatic --no-input --clear

            echo "======================================================"
            echo "Step 4/5 — Graceful gunicorn reload"
            echo "======================================================"
            cd $APP
            sudo systemctl reload gyangrit || sudo systemctl restart gyangrit
            sleep 4

            echo "======================================================"
            echo "Step 5/5 — Health check"
            echo "======================================================"
            # Hit Gunicorn directly on port 8000.
            # Pass Host + X-Forwarded-Proto so Django's ALLOWED_HOSTS check
            # and SECURE_SSL_REDIRECT both pass without 400/301 responses.
            HEALTH_OK=false
            for attempt in 1 2 3; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 10 \
                -H "Host: api.gyangrit.site" \
                -H "X-Forwarded-Proto: https" \
                http://127.0.0.1:8000/api/v1/health/ 2>/dev/null || echo "000")

              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Health check passed (attempt $attempt, HTTP $HTTP_STATUS)"
                HEALTH_OK=true
                break
              else
                echo "Health check attempt $attempt: HTTP $HTTP_STATUS — retrying in 5s..."
                sleep 5
              fi
            done

            if [ "$HEALTH_OK" = "false" ]; then
              echo "Health check failed after 3 attempts — triggering rollback"
              exit 1
            fi

            trap - ERR

            echo ""
            echo "Deploy complete. Running: $NEW_SHA"
            echo "Backend live at https://api.gyangrit.site"

      - name: Deploy succeeded
        if: success()
        run: echo "Production deployment successful"

      - name: Deploy failed — instructions
        if: failure()
        run: |
          echo "Deployment FAILED and was automatically rolled back."
          echo ""
          echo "To investigate:"
          echo "  ssh ubuntu@161.118.168.247"
          echo "  sudo journalctl -u gyangrit -n 100 --no-pager"
          echo "  sudo tail -20 /var/log/nginx/gyangrit_error.log"
          echo ""
          echo "The server is running the previous stable commit."
          exit 1
