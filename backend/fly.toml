# GyanGrit — Fly.io config
# Region: bom (Mumbai, India) — co-located with Supabase DB
# Deploy: fly deploy (from backend/ directory)

app = "gyangrit-backend"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DJANGO_SETTINGS_MODULE = "gyangrit.settings.prod"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health/"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
