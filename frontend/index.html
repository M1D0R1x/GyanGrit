<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon — inline SVG as data URI -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- DNS prefetch + preconnect — save ~200ms on first API call -->
    <link rel="dns-prefetch" href="https://api.gyangrit.site" />
    <link rel="preconnect" href="https://api.gyangrit.site" crossorigin />
    <!-- Fonts self-hosted via npm — no Google Fonts preconnect needed -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- PWA meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GyanGrit" />
    <meta name="msapplication-TileColor" content="#0d1117" />

    <!-- SEO -->
    <meta name="description" content="GyanGrit — Empowering rural students, one lesson at a time." />
    <meta name="application-name" content="GyanGrit" />

    <title>GyanGrit</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
